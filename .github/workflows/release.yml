name: Release & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Publish @vibe-interviewing/scenarios
        working-directory: packages/scenarios
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")

          if [ "$LOCAL_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION (registry has $PUBLISHED_VERSION)"
            TARBALL=$(pnpm pack --pack-gzip-level 9 | tail -1)
            npm publish "$TARBALL" --provenance --access public
          else
            echo "Skipping $PACKAGE_NAME — version $LOCAL_VERSION already published"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vibe-interviewing/core
        working-directory: packages/core
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")

          if [ "$LOCAL_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION (registry has $PUBLISHED_VERSION)"
            TARBALL=$(pnpm pack --pack-gzip-level 9 | tail -1)
            npm publish "$TARBALL" --provenance --access public
          else
            echo "Skipping $PACKAGE_NAME — version $LOCAL_VERSION already published"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish vibe-interviewing
        working-directory: packages/cli
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")

          if [ "$LOCAL_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "Publishing $PACKAGE_NAME@$LOCAL_VERSION (registry has $PUBLISHED_VERSION)"
            TARBALL=$(pnpm pack --pack-gzip-level 9 | tail -1)
            npm publish "$TARBALL" --provenance --access public
          else
            echo "Skipping $PACKAGE_NAME — version $LOCAL_VERSION already published"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
