name: 'FastAPI Rate Limiter — Race Condition'
version: '1.0.0'
description: 'A FastAPI API with a Redis-based rate limiter that has a TOCTOU race condition under concurrent load'
author: 'vibe-interviewing'
type: debug
difficulty: hard
estimated_time: 45m
tags: [python, fastapi, redis, concurrency, race-condition]

briefing: |
  You've been called in to investigate a production issue with a REST API's
  rate limiter. The ops team is seeing bursts of traffic that exceed the
  configured rate limit — sometimes 2-3x the allowed number of requests
  slip through in a short window.

  The rate limiter is backed by Redis and is supposed to allow at most
  10 requests per 60-second window per client IP. But under concurrent
  load, it consistently lets more through.

  The API runs at localhost:8000.

  Some things to try:
  - Run `pytest` to see which tests are currently failing
  - Read through the rate limiter middleware in `src/rate_limiter.py`
  - Try sending concurrent requests and observe the behavior
  - Check how Redis commands are being used

environment:
  dockerfile: ./Dockerfile
  compose_file: ./docker-compose.yml
  ports:
    - '8000:8000'
    - '6379:6379'
  commands: [python, pip, pytest, curl, redis-cli]
  setup_commands:
    - pip install -r requirements.txt
  healthcheck:
    command: 'curl -sf http://localhost:8000/health || exit 1'
    interval: 2s
    retries: 20

ai_context:
  role: |
    You are assisting a candidate in a technical interview.
    This is a debugging scenario — the candidate needs to find
    and fix a race condition in a Redis-based rate limiter.
  rules:
    - Do NOT directly reveal that the bug is a TOCTOU (time-of-check-time-of-use) race condition
    - Do NOT suggest using atomic INCR unless the candidate has identified the non-atomic GET/INCR pattern
    - Ask guiding questions about what happens when two requests arrive simultaneously
    - If stuck for more than 10 minutes, hint that the issue only appears under concurrent load
    - If stuck for more than 20 minutes, suggest they look at the sequence of Redis commands in rate_limiter.py
    - Encourage them to write or examine concurrent tests to reproduce the issue
  knowledge: |
    The bug is in src/rate_limiter.py in the check_rate_limit function.
    It performs a non-atomic read-then-write: GET key, check count, then INCR key.
    Between the GET and INCR, other concurrent requests can also GET the old value,
    all pass the check, and then all INCR — exceeding the limit.
    The fix is to INCR first (atomically), then check if the returned value exceeds
    the limit. If it does, the request is rejected. The first INCR also sets the
    TTL via EXPIRE if it's a new key.

evaluation:
  criteria:
    - Did they identify the race condition vs. looking for a logic error?
    - Did they understand the TOCTOU pattern (GET then INCR is non-atomic)?
    - Did they reproduce the bug with concurrent requests or tests?
    - Did they use Redis atomic operations (INCR) in their fix?
    - Did they consider edge cases (key expiry, first request)?
    - How effectively did they use the AI to reason about concurrency?
  expected_solution: |
    Fix src/rate_limiter.py to use atomic INCR first, then check the returned
    count against the limit. Use EXPIRE to set TTL only when the counter is 1
    (first request in the window). This eliminates the race because INCR is
    atomic in Redis — no two requests can read the same stale count.
