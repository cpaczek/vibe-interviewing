name = "vibe-interviewing"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[routes]]
pattern = "api.vibe-interviewing.iar.dev"
custom_domain = true

# R2 bucket for session storage
[[r2_buckets]]
binding = "SESSIONS"
bucket_name = "vibe-sessions"

[vars]
SESSION_TTL_HOURS = "24"
MAX_UPLOAD_SIZE_MB = "100"
